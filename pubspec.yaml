name: comandas_app
description: "Sistema de comandas para puesto de comida (nube + actualizaciones por el aire)."
publish_to: 'none'
version: 0.5.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "icon.png"
  adaptive_icon_background: "icon_bg.png"
  adaptive_icon_foreground: "icon_fg.png"
  min_sdk_android: 21
