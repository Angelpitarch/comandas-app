name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generar carpeta android (preservando pubspec y lib)
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp -r lib /tmp/lib_backup
          flutter create --platforms=android --project-name comandas_app --org com.puestocomida .
          cp /tmp/pubspec.yaml pubspec.yaml
          rm -rf lib && cp -r /tmp/lib_backup lib

      - name: Permiso de Internet para release
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' "$MANIFEST"
          fi
          echo "----- Manifest -----"; head -n 8 "$MANIFEST"

      - name: Dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: comandas-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
